services:
  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    restart: always
    shm_size: 128mb
    volumes:
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_DB: pfm_database
      POSTGRES_USER: pfm
      POSTGRES_PASSWORD: pfm0223
